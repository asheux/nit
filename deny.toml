[advisories]
unmaintained = "workspace"
unsound = "workspace"
yanked = "warn"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
]
unused-allowed-license = "allow"
exceptions = [
    { allow = ["MPL-2.0"], crate = "option-ext" },
    { allow = ["Unicode-3.0"], crate = "unicode-ident" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[bans]
multiple-versions = "allow"
