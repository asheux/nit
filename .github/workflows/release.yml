name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Tag must already exist."
        required: true
        type: string

permissions:
  contents: write # gh release create / edit; tarballs ship to S3, not GH.

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  RUSTUP_MAX_RETRIES: "10"
  RUST_BACKTRACE: "1"
  # Public-facing download base. Backed by CloudFront in front of an S3
  # bucket (download.nit.tools-…us-east-1-an). Path layout is
  # `<base>/<tag>/<asset>` plus `<base>/latest.json` for tag resolution.
  DOWNLOAD_BASE_URL: "https://download.nit.tools"
  AWS_DEFAULT_REGION: us-east-1

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: resolve
        name: Resolve tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' is not a valid semver tag (expected vX.Y.Z[-pre])"
            exit 1
          fi
          IS_PRE="false"
          [[ "$TAG" == *-* ]] && IS_PRE="true"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRE" >> "$GITHUB_OUTPUT"

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; reusing."
          else
            gh release create "$TAG" \
              --draft \
              --generate-notes \
              --title "$TAG" \
              --target "$GITHUB_SHA"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            archive: tar.gz
            install_deps: true
          # Universal macOS binary: built on macos-14 (Apple Silicon
          # runner), targets both aarch64 + x86_64, fused with `lipo` into a
          # single fat Mach-O. Runs native on both archs without Rosetta.
          # Avoids the macos-13 runner queue stall entirely.
          - target: universal-apple-darwin
            os: macos-14
            archive: tar.gz
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            universal: true
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.install_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          targets: ${{ matrix.rust_targets || matrix.target }}

      - name: Ensure cargo is on PATH (macOS runner image workaround)
        if: runner.os == 'macOS'
        shell: bash
        # See ci.yml — Homebrew's rustup on macos-14 (image ≥ 20260512.x)
        # leaves $HOME/.cargo/bin off PATH and a shim resolves `cargo` to
        # rustup-init. Force cargo bin to the front.
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          save-if: ${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.universal || 'false' }}" = "true" ]; then
            # Build both arch slices, then lipo into a universal binary.
            for slice in aarch64-apple-darwin x86_64-apple-darwin; do
              cargo build --release --locked --workspace \
                --target "$slice" \
                --bin nit \
                --bin nit-mcp-server
            done
            mkdir -p "target/${{ matrix.target }}/release"
            for bin in nit nit-mcp-server; do
              lipo -create \
                "target/aarch64-apple-darwin/release/$bin" \
                "target/x86_64-apple-darwin/release/$bin" \
                -output "target/${{ matrix.target }}/release/$bin"
              # Sanity check: confirm the output really has both archs.
              lipo -info "target/${{ matrix.target }}/release/$bin"
            done
          else
            cargo build --release --locked --workspace \
              --target ${{ matrix.target }} \
              --bin nit \
              --bin nit-mcp-server
          fi

      - name: Stage artifacts
        id: stage
        shell: bash
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          name="nit-${TAG}-${TARGET}"
          stage="$(pwd)/dist/${name}"
          mkdir -p "$stage"

          if [[ "$TARGET" == *windows* ]]; then
            cp "target/${TARGET}/release/nit.exe" "$stage/"
            cp "target/${TARGET}/release/nit-mcp-server.exe" "$stage/"
          else
            cp "target/${TARGET}/release/nit" "$stage/"
            cp "target/${TARGET}/release/nit-mcp-server" "$stage/"
            strip "$stage/nit" "$stage/nit-mcp-server" 2>/dev/null || true
          fi

          cp README.md LICENSE "$stage/"

          cd dist
          if [ "$ARCHIVE" = "zip" ]; then
            7z a "${name}.zip" "${name}" >/dev/null
            asset="${name}.zip"
          else
            tar czf "${name}.tar.gz" "${name}"
            asset="${name}.tar.gz"
          fi

          # SHA256
          if command -v sha256sum >/dev/null; then
            sha256sum "${asset}" > "${asset}.sha256"
          else
            shasum -a 256 "${asset}" > "${asset}.sha256"
          fi

          echo "asset=dist/${asset}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${asset}" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${asset}.sha256" >> "$GITHUB_OUTPUT"
          echo "sha=$(cut -d' ' -f1 "${asset}.sha256")" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload to S3
        shell: bash
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          set -euo pipefail
          asset="${{ steps.stage.outputs.asset }}"
          checksum="${{ steps.stage.outputs.checksum }}"
          asset_name="${{ steps.stage.outputs.asset_name }}"

          # Content-Type matters for browser downloads and curl progress bars.
          case "$asset_name" in
            *.tar.gz) content_type="application/gzip" ;;
            *.zip)    content_type="application/zip"  ;;
            *)        content_type="application/octet-stream" ;;
          esac

          aws s3 cp "$asset"    "s3://${BUCKET}/${TAG}/${asset_name}"        --content-type "$content_type"
          aws s3 cp "$checksum" "s3://${BUCKET}/${TAG}/${asset_name}.sha256" --content-type "text/plain; charset=utf-8"

      - name: Export checksum for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: checksum-${{ matrix.target }}
          path: ${{ steps.stage.outputs.checksum }}
          retention-days: 1

  checksums:
    name: Aggregate SHA256SUMS
    needs: [create-release, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: checksum-*
          merge-multiple: true
          path: sums

      - name: Build SHA256SUMS
        run: |
          set -e
          cd sums
          # Each downloaded file is `<asset>.sha256` containing one line.
          # Normalize the binary-mode prefix (" *file") that GNU sha256sum
          # emits on Windows into the text-mode form ("  file") used on
          # macOS/Linux, so install.sh/install.ps1 can grep for ` +<asset>$`
          # consistently across all three.
          cat *.sha256 | sed 's/ \*/  /' | sort > ../SHA256SUMS
          cd ..
          cat SHA256SUMS

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload SHA256SUMS to S3
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          aws s3 cp SHA256SUMS "s3://${BUCKET}/${TAG}/SHA256SUMS" \
            --content-type "text/plain; charset=utf-8"

      - name: Re-export SHA256SUMS as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sha256sums
          path: SHA256SUMS
          retention-days: 1

  cdn-finalize:
    name: Publish latest.json + install scripts + invalidate CloudFront
    needs: [create-release, build, checksums]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload install scripts
        env:
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          set -euo pipefail
          # install.sh + install.ps1 live at the bucket root so the README
          # one-liner (`curl -fsSL https://download.nit.tools/install.sh | bash`)
          # resolves directly. Short cache lets a bug-fix in the installer
          # propagate to users within minutes instead of hours.
          aws s3 cp install.sh "s3://${BUCKET}/install.sh" \
            --content-type "text/x-shellscript; charset=utf-8" \
            --cache-control "max-age=300, public"
          aws s3 cp install.ps1 "s3://${BUCKET}/install.ps1" \
            --content-type "text/plain; charset=utf-8" \
            --cache-control "max-age=300, public"

      - name: Write latest.json
        if: needs.create-release.outputs.is_prerelease == 'false'
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
          VERSION: ${{ needs.create-release.outputs.version }}
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          set -euo pipefail
          # `install.sh` curls latest.json to resolve the `latest` tag without
          # needing GitHub API auth. We deliberately do not write it for
          # pre-release tags so `latest` always points at a stable release.
          now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > latest.json <<EOF
          {
            "tag": "${TAG}",
            "version": "${VERSION}",
            "published_at": "${now}"
          }
          EOF
          cat latest.json
          # `no-cache` so a stale latest.json never lingers at the edge after
          # an invalidation request lags. Files in /${TAG}/ keep default
          # caching (immutable per-tag layout).
          aws s3 cp latest.json "s3://${BUCKET}/latest.json" \
            --content-type "application/json" \
            --cache-control "no-cache, max-age=0"

      - name: Invalidate CloudFront paths
        env:
          DIST_ID: ${{ secrets.AWS_CF_DISTRIBUTION_ID }}
          TAG: ${{ needs.create-release.outputs.tag }}
          IS_PRE: ${{ needs.create-release.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          # Always invalidate:
          #   /${TAG}/*    — cheap insurance against partial mid-release uploads
          #   /install.sh  — re-uploaded each run; cached for 5 min
          #   /install.ps1 — re-uploaded each run; cached for 5 min
          # Conditionally:
          #   /latest.json — only when we actually rewrote it (non-prerelease)
          paths="/${TAG}/* /install.sh /install.ps1"
          if [ "${IS_PRE}" = "false" ]; then
            paths="${paths} /latest.json"
          fi
          aws cloudfront create-invalidation \
            --distribution-id "${DIST_ID}" \
            --paths ${paths}

  homebrew:
    name: Update Homebrew tap
    needs: [create-release, build, checksums, cdn-finalize]
    runs-on: ubuntu-24.04
    if: ${{ needs.create-release.outputs.is_prerelease == 'false' }}
    steps:
      - name: Check tap token
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret not set; skipping tap update."
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      - name: Download aggregated SHA256SUMS
        if: env.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: sha256sums

      - name: Generate formula
        if: env.skip != 'true'
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
          VERSION: ${{ needs.create-release.outputs.version }}
          DOWNLOAD: ${{ env.DOWNLOAD_BASE_URL }}
        run: |
          set -euo pipefail
          # Extract per-asset checksums.
          get_sum() {
            grep -E " +nit-${TAG}-$1\.tar\.gz$" SHA256SUMS | awk '{print $1}'
          }
          SHA_MAC="$(get_sum universal-apple-darwin)"
          SHA_LINUX="$(get_sum x86_64-unknown-linux-gnu)"

          for v in "$SHA_MAC" "$SHA_LINUX"; do
            if [ -z "$v" ]; then
              echo "::error::Missing SHA256 for one of the macOS/Linux assets"
              exit 1
            fi
          done

          mkdir -p Formula
          cat > Formula/nit.rb <<EOF
          # This file is auto-generated by .github/workflows/release.yml.
          # Do not edit by hand; changes will be overwritten on the next release.
          class Nit < Formula
            desc "Terminal-native AI agent orchestrator with TUI"
            homepage "https://nit.tools"
            version "${VERSION}"
            license "MIT"

            # Single universal Mach-O covers Apple Silicon and Intel Macs.
            on_macos do
              url "${DOWNLOAD}/${TAG}/nit-${TAG}-universal-apple-darwin.tar.gz"
              sha256 "${SHA_MAC}"
            end

            on_linux do
              on_intel do
                url "${DOWNLOAD}/${TAG}/nit-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX}"
              end
            end

            def install
              bin.install "nit"
              bin.install "nit-mcp-server"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/nit --version 2>&1", 0)
            end
          end
          EOF
          cat Formula/nit.rb

      - name: Push formula to tap
        if: env.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TAP_REPO="asheux/homebrew-tap"
          gh repo clone "$TAP_REPO" tap -- --depth=1
          mkdir -p tap/Formula
          cp Formula/nit.rb tap/Formula/nit.rb
          cd tap
          git add Formula/nit.rb
          # `git diff --cached --quiet` returns 0 when the staging area is
          # empty (no real change vs. HEAD). Using `--cached` (instead of the
          # working-tree-only `git diff --quiet`) is what makes this work for
          # a brand-new Formula/nit.rb that the tap repo has never seen.
          if git diff --cached --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git commit -m "nit ${TAG}"
          git push origin HEAD

  publish-release:
    name: Promote release
    needs: [create-release, build, checksums, cdn-finalize, homebrew]
    if: always() && needs.build.result == 'success' && needs.checksums.result == 'success' && needs.cdn-finalize.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Promote draft → published
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
          IS_PRE: ${{ needs.create-release.outputs.is_prerelease }}
        run: |
          # Mark the GitHub release page as prerelease if the tag has a
          # `-rcN` etc. suffix, so it doesn't show up as the canonical
          # latest release.
          PRE_FLAG=""
          if [ "${IS_PRE}" = "true" ]; then
            PRE_FLAG="--prerelease"
          fi
          gh release edit "${TAG}" \
            --repo "${{ github.repository }}" \
            --draft=false ${PRE_FLAG}
