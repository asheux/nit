version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      patch-updates:
        update-types: ["patch"]
    ignore:
      # `time` is pinned via `[patch.crates-io]` to a vendored copy under `vendor/time`.
      - dependency-name: "time"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
