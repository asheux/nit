schema_version = 1
game = "ipd"
rounds = 20000
repetitions = 1
self_play = true
seed = 42
noise = 0.0

[payoff]
R = -1
S = -3
T = 0
P = -2
matrix = [
  [[-1, -1], [-3, 0]],
  [[0, -3], [-2, -2]],
]

[history]
enabled = true

[engine]
mode = "interactive"
parallelism = "auto"
progress_interval_ms = 80
fast_eval = true
accelerator = "metal" # auto|cpu|metal
score_aggregation = "mean" # Code-02 semantics: per-round average score; TotalPayoff sums matchup means
fsm_grouping = "wnbm"  # or "moorem"

[engine.complexity_cost]
enabled = false
tm_step_cost = 0.0
fsm_state_cost = 0.0

